<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<!-- خط رومانسي -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* خلفية قلوب وورود */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://i.imgur.com/8Km9tLL.png');
    background-size: cover;
    opacity: 0.35;
}

/* شاشة الباسورد */
#login {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

#login h2 {
    margin-bottom: 15px;
    color: #ff4d6d;
}

input {
    padding: 12px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    outline: none;
    width: 200px;
}

button {
    padding: 10px 25px;
    margin-top: 15px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e63950;
}

/* المحتوى */
#content {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 85%;
}

/* الكلام */
.message {
    font-size: 24px;
    color: #333;
    background: rgba(255,255,255,0.85);
    padding: 25px;
    border-radius: 20px;
    line-height: 1.8;
    box-shadow: 0 0 25px rgba(0,0,0,0.2);
}

/* اسمها */
.name {
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
    color: #ff4d6d;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="hearts"></div>

<div id="login">
    <h2>ادخل الباسورد ❤️</h2>
    <input type="password" id="password" placeholder="الباسورد">
    <br>
    <button onclick="checkPassword()">دخول</button>
</div>

<div id="content">
    <div class="name">لـ فاطمة ❤️</div>
    <div class="message">
        حقك عليا على أي حاجة حصلت…  
        بجد مكنتش بكدب عليكي في أي حاجة،  
        وأنا آسف إني طولت في المكالمة…  

        بس والله معملتش كده غير عشان تبعد عننا خالص،  
        ونرتاح أنا وإنتي من أي حاجة ممكن تضايقنا،  
        ونفضل سوا مبسوطين من غير خوف من أي حاجة…  

        حقك عليا يا نور عيني،  
        ومتزعليش مني ❤️
    </div>
</div>

<audio id="music" loop>
    <source src="fatma.mp3" type="audio/mpeg">
</audio>

<script>
function checkPassword() {
    var pass = document.getElementById("password").value.trim();

    if(pass === "2372025") {
        document.getElementById("login").style.display = "none";
        document.getElementById("content").style.display = "block";

        var music = document.getElementById("music");
        music.currentTime = 0;
        music.volume = 0;

        music.play().then(() => {
            let vol = 0;
            let fade = setInterval(() => {
                if(vol < 1){
                    vol += 0.05;
                    music.volume = vol;
                } else {
                    clearInterval(fade);
                }
            }, 200);
        }).catch((e) => {
            console.log(e);
        });

    } else {
        alert("الباسورد غلط 😢");
    }
}
</script>

</body>
</html>
